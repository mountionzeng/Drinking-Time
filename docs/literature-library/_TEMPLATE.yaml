# ─────────────────────────────────────────────────────────────
# 文学库条目模板  ——  复制本文件到 entries/<id>.yaml 开始填
# 一条目 = 一位文学家 / 一把可辨识的「声音」。库 = 一堆这样的条目。
# 剧本 Agent：按「落点」用当前用户的情绪流动排序 → 取若干把声音 → 作共鸣参照注入剧本。
# 守则：库是共鸣透镜，不是代笔。借视角照见用户自己的思绪，不替用户拔高 / 评判 / 伪造原话。
# ─────────────────────────────────────────────────────────────

id:            # 稳定 slug（英文小写连字符），系统引用用，定了别改。例：lu-xun
name:          # 展示名（中文）。例：鲁迅·冷峻的清醒
one_liner:     # 一句人话气质（给剧本 Agent 和你自己看）
status: draft  # draft = 在养、还没上线 ／ active = 进共鸣候选

# ── 文学 DNA：这几栏注入剧本 prompt（literatureToFragments 把它们落成带标签片段）──
viewpoint:        # 观点 / 世界观：这把声音如何看待人生与情感（最该点名的一栏）
voice:            # 语言声音：句法、语气、节奏、密度
themes: []        # 母题：反复书写的题目
devices: []       # 手法：反讽 / 白描 / 通感 / 留白 …
signature_lines: []  # 代表句：共鸣参照，不是照抄进剧本的素材
era_culture:      # 时空坐标
negative: []      # ★ 这把声音最不该被写成什么（和正面一样重要）

# ── 落点：共鸣排序用。只是先验，用户的真实情绪流动会覆盖它 ──
emotion_fit: []   # 适配的情绪
theme_fit: []     # 适配的题材 / 场景
affinity:         # 人群亲和权重 0–3（0 = 无关，3 = 强）。宁可少标、别硬标
  age: {}         # 例：{偏年长: 2, 青年: 0}
  profession: {}  # 例：{人文/手艺/学术: 2, 创意: 1}
  wuxing: {}      # 例：{金: 2, 水: 1}

# ── 校准 ──
references: []    # 1–3 个你认的范例（篇名 / 出处）
notes:            # 给自己的提醒（这把声音易翻车的点等）
