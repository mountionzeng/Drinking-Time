id: bauhaus-geometric
name: 包豪斯·极简几何
one_liner: 红黄蓝和圆方三角，理性到极致反而很安静

style: [Bauhaus, geometric abstraction, modernist design, constructivism, flat geometric shapes]
palette: [三原色 红黄蓝, 纯黑, 纯白, 有限平涂色块]
light: 无写实光影，平面均匀，靠色块分面
composition: 几何分割，圆/方/三角，网格秩序，非对称的平衡，大量留白
material: 平涂硬边色块，干净印刷质感，无颗粒无渐变
