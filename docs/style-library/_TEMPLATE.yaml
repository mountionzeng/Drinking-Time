# ─────────────────────────────────────────────────────────────
# 流派库条目模板  ——  复制本文件到 entries/<id>.yaml 开始填
# 一条目 = 一个美术流派 / 表达形式。库 = 一堆这样的条目。
# 出 6 草稿时：按「落点」给当前用户排序 → 取 6 条 → 各自注入出图。
# ─────────────────────────────────────────────────────────────

id:            # 稳定 slug（英文小写连字符），系统引用用，定了别改。例：rembrandt-oil
name:          # 展示名（中文）。例：伦勃朗光·荷兰黄金时代油画
one_liner:     # 一句人话气质（给小酌和你自己看）。例：暗调里被一束暖光雕出来的人
status: draft  # draft = 在养、还没上线 ／ active = 进 6 候选轮换

# ── 视觉 DNA：这几栏直接注入出图 prompt（合成缝 shotPromptComposer 认这些槽位）──
style: []      # 媒介/技法/流派名/"in the manner of X"。最关键、最该点名的一栏
palette: []    # 色调清单（中文即可）
light:         # 光的签名（最能定流派的一栏之一）
composition:   # 画面经营（景别 / 主体位置 / 留白）
material:      # 表面质感（笔触 / 颗粒 / 纹理）
era_culture:   # 时空坐标
signature:     # ★ 一眼签名：低分辨率草稿里也必须认得出的那个点
negative: []   # 这流派最怕变成什么（和正面一样重要）

# ── 落点：冷启动排序用。只是先验，用户一开始多选/略过就会覆盖它 ──
emotion_fit: []   # 适配的情绪
theme_fit: []     # 适配的题材 / 场景
affinity:         # 人群亲和权重 0–3（0 = 无关，3 = 强）。宁可少标、别硬标
  age: {}         # 例：{偏年长: 2, 青年: 0}
  profession: {}  # 例：{人文/手艺/学术: 2, 创意: 1}
  wuxing: {}      # 例：{土: 2, 金: 2, 火: 0}

# ── 校准 ──
references: []    # 1–3 张你认的范例图（放 refs/ 下，相对路径引用）
notes:            # 给自己的提醒（草稿易翻车的点等）
